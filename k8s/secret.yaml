# Kubernetes Secret — SportsBrain (Week 7)
#
# Demonstrates the secret-injection pattern: the LangSmith API key lives here
# and is injected into the app Deployment via secretKeyRef (see deployment.yaml),
# never baked into the image.
#
# The value below is an intentional PLACEHOLDER. For this deployment tracing is
# disabled (see configmap.yaml), so the key is never exercised — the pod only
# needs the Secret to exist for the reference to resolve. Committing a
# placeholder is safe; do NOT commit a real credential here.
#
# In production, the real value is injected out-of-band (e.g. AWS Secrets
# Manager or Sealed Secrets) rather than stored in a manifest.
#
# stringData accepts the raw value — Kubernetes base64-encodes it on apply.
apiVersion: v1
kind: Secret
metadata:
  name: sportsbrain-secrets
  labels:
    app: sportsbrain
type: Opaque
stringData:
  LANGCHAIN_API_KEY: "placeholder-not-a-real-key"
