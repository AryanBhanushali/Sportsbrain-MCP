# Kubernetes Services — SportsBrain (Week 7)
# app:   LoadBalancer — public entry via an AWS ELB (port 80 -> container 8000)
# redis: ClusterIP    — internal only, reached by the app at redis://redis:6379
---
apiVersion: v1
kind: Service
metadata:
  name: sportsbrain-app
  labels:
    app: sportsbrain
    component: api
spec:
  type: LoadBalancer
  selector:
    app: sportsbrain
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: sportsbrain
    component: cache
spec:
  type: ClusterIP
  selector:
    app: sportsbrain
    component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
